services:
  postgres:
    image: postgres:16.3-alpine
    container_name: pc-remote-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pcremote
      POSTGRES_PASSWORD: pcremote
      POSTGRES_DB: pc_remote
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcremote -d pc_remote"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: pc-remote-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: