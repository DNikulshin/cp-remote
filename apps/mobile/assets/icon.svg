<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!--
    WiFi paths from Material Design (viewBox 0 0 24 24).
    Transform: translate(296, 239) scale(18)
      → WiFi x: 314..710 (396px, centred at x=512)
      → WiFi y: ~293..~599 (centred at y=446 = screen centre)

    Subpaths as separate elements so each can have its own opacity:
      outer  : M1 9 l2 2 c4.97-4.97 13.03-4.97 18 0 l2-2 C16.93 2.93 7.08 2.93 1 9 z
      middle : M5 13 l2 2 c2.76-2.76 7.24-2.76 10 0 l2-2 C15.14 9.14 8.87 9.14 5 13 z
      inner  : M9 17 l3 3 3-3 c-1.65-1.66-4.34-1.66-6 0 z
  -->

  <!-- ── Background ── -->
  <rect width="1024" height="1024" fill="#0f0f23"/>

  <!-- ── Monitor body ── -->
  <rect x="80" y="160" width="864" height="576" rx="48" fill="#1a1a2e"/>
  <rect x="80" y="160" width="864" height="576" rx="48"
        fill="none" stroke="#6c63ff" stroke-width="6" opacity="0.42"/>

  <!-- ── Screen ── -->
  <rect x="112" y="192" width="800" height="508" rx="28" fill="#080818"/>

  <!-- ── WiFi glow layer (blurred copy) ── -->
  <defs>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>
  <g transform="translate(296,239) scale(18)" filter="url(#glow)" opacity="0.55">
    <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z"  fill="#6c63ff"/>
    <path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" fill="#6c63ff"/>
    <path d="M9 17l3 3 3-3c-1.65-1.66-4.34-1.66-6 0z"                            fill="#6c63ff"/>
  </g>

  <!-- ── WiFi main (outer → inner, opacity gradient) ── -->
  <g transform="translate(296,239) scale(18)">
    <path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9z"
          fill="#6c63ff" opacity="0.38"/>
    <path d="M5 13l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"
          fill="#6c63ff" opacity="0.68"/>
    <path d="M9 17l3 3 3-3c-1.65-1.66-4.34-1.66-6 0z"
          fill="#6c63ff"/>
  </g>

  <!-- ── Stand neck ── -->
  <rect x="472" y="736" width="80" height="82" fill="#1a1a2e"/>

  <!-- ── Stand base ── -->
  <rect x="287" y="818" width="450" height="50" rx="25"
        fill="#1a1a2e" stroke="#6c63ff" stroke-width="5" opacity="0.42"/>
</svg>
