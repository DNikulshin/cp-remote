name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # каждые 10 минут
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pc-remote-backend.onrender.com/health)
          echo "Health check status: $STATUS"
          [ "$STATUS" = "200" ] || exit 1
